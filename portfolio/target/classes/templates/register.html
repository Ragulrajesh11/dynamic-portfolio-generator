<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Portfoliify</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .auth-box { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(20px); padding: 40px; border-radius: 25px; width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { text-align: center; margin-bottom: 25px; color: #f8fafc; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; border-radius: 12px; color: white; outline: none; }
        .btn { width: 100%; padding: 14px; background: #8b5cf6; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }
        .toggle { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 0.9rem; }
        .toggle a { color: #a78bfa; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div style="font-size: 2.5rem; font-weight: 800; margin-bottom: 20px;">Portfoliify</div>
<div class="auth-box">
    <h2>Create Account</h2>
    <form action="/api/auth/register" method="POST">
        <input type="text" name="username" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn">Register Now</button>
    </form>
    <p class="toggle">Already have an account? <a href="/login">Login here</a></p>
</div>
</body>
</html>
