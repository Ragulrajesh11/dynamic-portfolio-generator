<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #111116; color: #fff8f0; font-family: 'Segoe UI', Roboto, sans-serif; padding: 50px 20px; }
        .container { max-width: 850px; margin: auto; }
        .hero-spot { position: relative; padding: 60px 0; border-bottom: 1px solid rgba(255,107,107,0.2); }
        h1 { font-size: 3.5rem; font-weight: 800; color: #ffffff; line-height: 1.1; }
        .gradient-text { background: linear-gradient(to right, #ff6b6b, #ffe066); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 1.4rem; color: #ffe066; margin-top: 10px; font-weight: 300; }
        .content-section { padding: 40px 0; }
        h3 { font-size: 1.5rem; color: #ff6b6b; margin-bottom: 20px; font-weight: 600; }
        .desc { font-size: 1.1rem; line-height: 1.7; color: #c1c1cd; }
        .web-card { background: #1a1a24; padding: 30px; border-radius: 16px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .skills-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .skill-node { background: rgba(255,107,107,0.1); color: #ff6b6b; padding: 8px 18px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; }
        .action-btn { display: inline-block; padding: 12px 30px; background: linear-gradient(45deg, #ff6b6b, #ff8787); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 40px; margin-right: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-spot">
        <h1>I am <span class="gradient-text">[fullName]</span></h1>
        <div class="subtitle">[title]</div>
    </div>
    <div class="content-section">
        <h3>Storyline</h3>
        <p class="desc">[about]</p>
    </div>
    <div class="content-section">
        <h3>Creative Showcase</h3>
        <div class="web-card">
            <h4 style="font-size: 1.3rem; color: #ffe066; margin-bottom: 10px;">[projectName]</h4>
            <p class="desc" style="font-size: 1rem;">[projectDesc]</p>
        </div>
    </div>
    <div class="content-section">
        <h3>Tech Arsenal</h3>
        <div class="skills-container">
            <span class="skill-node">[skills]</span>
        </div>
    </div>
    <a href="[linkedin]" class="action-btn">View LinkedIn</a>
    <a href="[github]" class="action-btn" style="background: #2a2a35;">GitHub</a>
</div>
</body>
</html>
