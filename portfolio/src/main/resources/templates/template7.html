<!DOCTYPE html>
<html>
<body style="font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; padding: 40px;">
<div style="max-width: 600px; margin: auto; background: #ffffff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
    <div style="background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); padding: 45px 35px; text-align: center; color: #ffffff;">
        <h1 style="margin: 0; font-size: 32px; font-weight: 800;">[fullName]</h1>
        <p style="margin-top: 10px; opacity: 0.9; font-size: 18px; letter-spacing: 0.5px;">[title]</p>
    </div>
    <div style="padding: 35px; color: #475569;">
        <h3 style="color: #3b82f6; margin-top: 0;">About Me</h3>
        <p style="line-height: 1.6;">[about]</p>
        <h3 style="color: #4f46e5; margin-top: 25px;">Featured Architecture</h3>
        <h4 style="color: #1e293b; margin-bottom: 5px;">[projectName]</h4>
        <p style="font-size: 14px; line-height: 1.5; margin-top: 0;">[projectDesc]</p>
        <h3 style="color: #3b82f6; margin-top: 25px;">Skills & Competencies</h3>
        <p style="color: #1e293b; font-weight: 500;">[skills]</p>
        <div style="margin-top: 35px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px;">
            <a href="[linkedin]" style="color: #4f46e5; font-weight: bold; text-decoration: none; margin: 0 15px;">LinkedIn</a>
            <a href="[github]" style="color: #3b82f6; font-weight: bold; text-decoration: none; margin: 0 15px;">GitHub</a>
        </div>
    </div>
</div>
</body>
</html>
