<!DOCTYPE html>
<html>
<body style="font-family: 'Segoe UI', sans-serif; background: #0f172a; padding: 40px; color: #ffffff;">
<div style="max-width: 600px; margin: auto; background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);">
    <h1 style="margin: 0; font-size: 28px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">[fullName]</h1>
    <p style="color: #94a3b8; margin-top: 5px; font-size: 16px;">[title]</p>
    <div style="margin-top: 25px; background: rgba(15, 23, 42, 0.4); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
        <h3 style="margin-top: 0; color: #38bdf8;">Biography</h3>
        <p style="line-height: 1.6; color: #cbd5e1; margin-bottom: 0;">[about]</p>
    </div>
    <h3 style="color: #818cf8; margin-top: 25px;">Project Deployment</h3>
    <p style="font-weight: bold; margin-bottom: 5px;">[projectName]</p>
    <p style="color: #94a3b8; font-size: 14px; margin-top: 0;">[projectDesc]</p>
    <h3 style="color: #38bdf8; margin-top: 25px;">Core Stack</h3>
    <p style="color: #cbd5e1;">[skills]</p>
    <div style="margin-top: 30px; display: flex; gap: 20px;">
        <a href="[linkedin]" style="color: #38bdf8; text-decoration: none; font-weight: 600;">Connect on LinkedIn →</a>
    </div>
</div>
</body>
</html>
