<!DOCTYPE html>
<html>
<body style="font-family: Georgia, serif; background-color: #fdfbf7; padding: 40px; color: #2d2d2d;">
<div style="max-width: 600px; margin: auto; background: #ffffff; padding: 40px; border: 1px solid #e8e4db; box-shadow: 0 4px 20px rgba(0,0,0,0.02);">
    <h1 style="font-size: 34px; font-weight: normal; text-align: center; margin-bottom: 5px; color: #1a1a1a;">[fullName]</h1>
    <p style="font-style: italic; text-align: center; color: #777777; margin-top: 0; font-size: 16px;">[title]</p>
    <div style="text-align: center; margin: 20px 0;">
        <span style="display: inline-block; width: 40px; height: 1px; background: #bca374;"></span>
    </div>
    <p style="line-height: 1.7; text-align: justify; font-size: 15px;">[about]</p>
    <h3 style="font-weight: normal; color: #bca374; border-bottom: 1px solid #e8e4db; padding-bottom: 5px; margin-top: 30px;">Key Accomplishment</h3>
    <p style="font-size: 16px; margin-bottom: 5px;"><strong>[projectName]</strong></p>
    <p style="font-size: 14px; color: #555555; line-height: 1.5; margin-top: 0;">[projectDesc]</p>
    <h3 style="font-weight: normal; color: #bca374; border-bottom: 1px solid #e8e4db; padding-bottom: 5px; margin-top: 30px;">Core Expertise</h3>
    <p style="font-size: 15px; letter-spacing: 0.5px;">[skills]</p>
    <div style="margin-top: 40px; text-align: center; font-size: 14px;">
        <a href="[linkedin]" style="color: #1a1a1a; text-decoration: none; font-weight: bold; margin: 0 10px;">LinkedIn</a> |
        <a href="[github]" style="color: #1a1a1a; text-decoration: none; font-weight: bold; margin: 0 10px;">GitHub</a>
    </div>
</div>

</html>
