<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Portfoliify</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(-45deg, #0f172a, #1e1b4b, #1e3a8a, #0f172a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .brand-logo { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; background: linear-gradient(to right, #6366f1, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-box { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(20px); padding: 40px; border-radius: 25px; width: 400px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h2 { text-align: center; margin-bottom: 25px; font-weight: 600; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; border-radius: 12px; color: white; outline: none; }
        input:focus { border-color: #6366f1; }
        .btn { width: 100%; padding: 14px; background: #6366f1; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .toggle { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 0.9rem; }
        .toggle a { color: #818cf8; text-decoration: none; font-weight: 600; }
        footer { position: absolute; bottom: 20px; font-size: 0.85rem; color: rgba(148, 163, 184, 0.8); }
    </style>
</head>
<body>
<div class="brand-logo">Portfoliify</div>
<div class="auth-box">
    <h2>Welcome Back</h2>
    <form action="/api/auth/login" method="POST">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn">Login to Dashboard</button>
    </form>
    <p class="toggle">Don't have an account? <a href="/register">Register here</a></p>
</div>
<footer>Portfoliify@ragul-fullstackdeveloper</footer>
</body>
</html>
